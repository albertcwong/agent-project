- id: "forecast_with_seasonality"
  question: "Forecast monthly sales for the next 6 months, accounting for seasonal patterns. Show confidence intervals."
  category: "python_advanced"
  expected:
    tools_required: ["get-datasource-metadata", "query-datasource", "execute_python"]
    answer_must_contain: ["forecast"]
    answer_must_not_contain: ["truncated", "I cannot", "not possible"]
    max_iterations: 10

