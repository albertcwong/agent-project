# Dev override: hot reload. Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Frontend: npm run dev with source mounted. Agent: uvicorn --reload with agent/ mounted.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    volumes:
      - ./agent:/app/agent
      - ./.env.agent:/app/.env.agent:ro
    command: uv run uvicorn agent.main:app --host 0.0.0.0 --port 8001 --reload
